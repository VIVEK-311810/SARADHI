name: Backend CI/CD

# Triggers:
#   - Every push to main that touches backend code  → run tests + trigger Render deploy
#   - Every PR targeting main that touches backend  → run tests only (Render does not deploy)
on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

jobs:
  # ─── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # The backend tests require env vars for JWT, DB, etc.
    # Use dummy values here so unit tests don't hit real services.
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret
      SESSION_SECRET: ci-test-session

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ─── 2. Trigger Render Deploy (main push only) ──────────────────────────────
  # Render auto-deploys on every push to main via its Git integration.
  # This job gives you explicit control — it calls the Render deploy hook
  # ONLY after tests pass, preventing a broken build from reaching production.
  #
  # How it works:
  #   Render exposes a webhook URL per service. When called, it triggers a deploy.
  #   This replaces Render's "auto-deploy on push" with "deploy only if CI passes".
  #
  # Setup:
  #   1. In Render dashboard → your service → Settings → Deploy Hook → copy URL
  #   2. Add it as RENDER_DEPLOY_HOOK_URL in GitHub Secrets
  #   3. In Render dashboard → Settings → Auto-Deploy → set to "No" (CI controls it now)
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy
        run: |
          curl --silent --show-error --fail \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deploy triggered successfully"

# ─── Required GitHub Secrets ─────────────────────────────────────────────────
# Add these in: GitHub repo → Settings → Secrets and variables → Actions
#
#   RENDER_DEPLOY_HOOK_URL → Render dashboard → your service → Settings → Deploy Hook
#
# Optional: if your tests need real service keys (integration tests), add them here too:
#   SUPABASE_URL, SUPABASE_SERVICE_KEY, PINECONE_API_KEY, etc.
#   But keep unit tests independent of external services where possible.
