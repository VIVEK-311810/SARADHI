name: Frontend CI/CD

# Triggers:
#   - Every push to main that touches frontend code  → production deploy
#   - Every PR targeting main that touches frontend  → preview deploy + comment
on:
  push:
    branches: [main]
    paths: ['frontend/**']
  pull_request:
    branches: [main]
    paths: ['frontend/**']

jobs:
  # ─── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

  # ─── 2. Deploy Preview (PRs only) ───────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Pull project settings + env vars from Vercel for the preview environment
      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --cwd frontend --token=${{ secrets.VERCEL_TOKEN }}

      # Build the project locally using Vercel's build pipeline
      - name: Build
        run: CI=false vercel build --cwd frontend --token=${{ secrets.VERCEL_TOKEN }}

      # Deploy the pre-built output; capture the unique preview URL
      - name: Deploy to preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --cwd frontend --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT

      # Post the preview URL as a PR comment so the team can click directly
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## Frontend Preview',
                '',
                `Deployed to: ${{ steps.deploy.outputs.url }}`,
                '',
                '_Commit: `${{ github.sha }}`_'
              ].join('\n')
            })

  # ─── 3. Deploy Production (main push only) ──────────────────────────────────
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Pull production env vars and project settings
      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --cwd frontend --token=${{ secrets.VERCEL_TOKEN }}

      # Build with production env vars
      - name: Build
        run: CI=false vercel build --prod --cwd frontend --token=${{ secrets.VERCEL_TOKEN }}

      # Deploy the pre-built output to production
      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --cwd frontend --token=${{ secrets.VERCEL_TOKEN }}

# ─── Required GitHub Secrets ─────────────────────────────────────────────────
# Add these in: GitHub repo → Settings → Secrets and variables → Actions
#
#   VERCEL_TOKEN      → vercel.com/account/tokens → Create Token
#   VERCEL_ORG_ID     → from frontend/.vercel/project.json (run: vercel link in frontend/)
#   VERCEL_PROJECT_ID → from frontend/.vercel/project.json (run: vercel link in frontend/)
#
# Note: VERCEL_ORG_ID and VERCEL_PROJECT_ID are read automatically by the CLI
# from the .vercel/project.json that gets created when you run `vercel link`.
# Commit frontend/.vercel/project.json to your repo (it contains no secrets).
